<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — Minijuego</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --text: #e0e0e0;
      --text-muted: #888888;
      --accent: #00d4ff;
      --table-header-bg: #16213e;
      --table-row-even: rgba(255, 255, 255, 0.03);
      --table-row-odd: transparent;
      --table-border: rgba(255, 255, 255, 0.08);
      --error-bg: rgba(255, 71, 87, 0.15);
      --error-text: #ff4757;
      --loading-color: #00d4ff;
      --medal-gold: #ffd700;
      --medal-silver: #c0c0c0;
      --medal-bronze: #cd7f32;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      background-image: linear-gradient(135deg, var(--bg) 0%, var(--bg-secondary) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header p {
      margin: 0.5rem 0 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 3rem 1rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(0, 212, 255, 0.2);
      border-top-color: var(--loading-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error {
      background: var(--error-bg);
      border: 1px solid var(--error-text);
      color: var(--error-text);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
    }

    #error button {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background: var(--error-text);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    #error button:hover {
      filter: brightness(1.1);
    }

    #empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    #sort-controls {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    #sort-controls button {
      padding: 0.5rem 1rem;
      background: var(--table-header-bg);
      color: var(--text);
      border: 1px solid var(--table-border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #sort-controls button:hover {
      border-color: var(--accent);
    }

    #sort-controls button.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-secondary);
      border: 1px solid var(--table-border);
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: var(--table-header-bg);
    }

    th, td {
      padding: 0.9rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--table-border);
    }

    th {
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    tbody tr:nth-child(even) {
      background: var(--table-row-even);
    }

    tbody tr:nth-child(odd) {
      background: var(--table-row-odd);
    }

    tbody tr:hover {
      background: rgba(0, 212, 255, 0.08);
    }

    .rank {
      font-weight: 700;
      width: 80px;
    }

    .medal {
      margin-left: 0.4rem;
    }

    .score {
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.4rem;
      }

      thead {
        display: none;
      }

      table, tbody, tr, td {
        display: block;
        width: 100%;
      }

      tr {
        margin-bottom: 0.75rem;
        border: 1px solid var(--table-border);
        border-radius: 8px;
        overflow: hidden;
      }

      td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--table-border);
      }

      td:last-child {
        border-bottom: none;
      }

      td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 0.75rem;
      }

      .score {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Leaderboard</h1>
    <p>Minijuego — Puntuaciones en vivo</p>
  </header>

  <main>
    <div id="loading">
      <div class="spinner" aria-label="Cargando puntuaciones"></div>
      <p>Cargando puntuaciones...</p>
    </div>

    <div id="error" hidden>
      <p>No se pudieron cargar las puntuaciones.</p>
      <button type="button" id="retry-button">Reintentar</button>
    </div>

    <div id="empty" hidden>
      <p>No hay puntuaciones todavía</p>
    </div>

    <div id="sort-controls" hidden>
      <button type="button" id="sort-desc" class="active">Ordenar DESC</button>
      <button type="button" id="sort-asc">Ordenar ASC</button>
    </div>

    <table id="leaderboard-table" hidden>
      <thead>
        <tr>
          <th scope="col">Rank</th>
          <th scope="col">Jugador</th>
          <th scope="col" style="text-align: right;">Puntuación</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </main>

  <footer>
    <p>Quidient — Minijuego</p>
  </footer>

  <script>
    (function () {
      const API_URL = 'https://corsproxy.io/?http://dreamlo.com/lb/6a2c62ce8f40bb1318990cf5/json';
      const TIMEOUT_MS = 8000;

      let entries = [];
      let sortDirection = 'desc';
      let isLoading = false;
      let hasError = false;

      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const emptyEl = document.getElementById('empty');
      const sortControlsEl = document.getElementById('sort-controls');
      const tableEl = document.getElementById('leaderboard-table');
      const tbodyEl = document.getElementById('leaderboard-body');
      const retryButton = document.getElementById('retry-button');
      const sortDescButton = document.getElementById('sort-desc');
      const sortAscButton = document.getElementById('sort-asc');

      function setLoading(loading) {
        isLoading = loading;
        loadingEl.hidden = !loading;
        if (loading) {
          errorEl.hidden = true;
          emptyEl.hidden = true;
          sortControlsEl.hidden = true;
          tableEl.hidden = true;
        }
      }

      function setError(error) {
        hasError = error;
        errorEl.hidden = !error;
      }

      function normalizeEntries(data) {
        if (!data || !data.dreamlo || !data.dreamlo.leaderboard) {
          return [];
        }
        const raw = data.dreamlo.leaderboard.entry;
        if (!raw) {
          return [];
        }
        const list = Array.isArray(raw) ? raw : [raw];
        return list.map(function (entry) {
          return {
            name: String(entry.name || 'Anónimo'),
            score: Number(entry.score) || 0
          };
        });
      }

      function sortEntries() {
        entries.sort(function (a, b) {
          return sortDirection === 'asc' ? a.score - b.score : b.score - a.score;
        });
      }

      function getRankContent(rank) {
        if (rank === 1) return rank + '<span class="medal" aria-hidden="true">🥇</span>';
        if (rank === 2) return rank + '<span class="medal" aria-hidden="true">🥈</span>';
        if (rank === 3) return rank + '<span class="medal" aria-hidden="true">🥉</span>';
        return String(rank);
      }

      function render() {
        tbodyEl.innerHTML = '';

        if (entries.length === 0) {
          emptyEl.hidden = false;
          sortControlsEl.hidden = true;
          tableEl.hidden = true;
          return;
        }

        emptyEl.hidden = true;
        sortControlsEl.hidden = false;
        tableEl.hidden = false;

        entries.forEach(function (entry, index) {
          const rank = index + 1;
          const row = document.createElement('tr');

          const rankCell = document.createElement('td');
          rankCell.className = 'rank';
          rankCell.setAttribute('data-label', 'Rank');
          rankCell.innerHTML = getRankContent(rank);

          const nameCell = document.createElement('td');
          nameCell.setAttribute('data-label', 'Jugador');
          nameCell.textContent = entry.name;

          const scoreCell = document.createElement('td');
          scoreCell.className = 'score';
          scoreCell.setAttribute('data-label', 'Puntuación');
          scoreCell.textContent = entry.score.toLocaleString();

          row.appendChild(rankCell);
          row.appendChild(nameCell);
          row.appendChild(scoreCell);
          tbodyEl.appendChild(row);
        });
      }

      function updateSortButtons() {
        if (sortDirection === 'asc') {
          sortAscButton.classList.add('active');
          sortDescButton.classList.remove('active');
        } else {
          sortDescButton.classList.add('active');
          sortAscButton.classList.remove('active');
        }
      }

      function handleSort(direction) {
        sortDirection = direction;
        updateSortButtons();
        sortEntries();
        render();
      }

      async function fetchLeaderboard() {
        if (isLoading) return;
        setLoading(true);
        setError(false);

        const controller = new AbortController();
        const timeoutId = setTimeout(function () {
          controller.abort();
        }, TIMEOUT_MS);

        try {
          const response = await fetch(API_URL, { signal: controller.signal });
          clearTimeout(timeoutId);

          if (!response.ok) {
            throw new Error('HTTP ' + response.status);
          }

          const data = await response.json();
          entries = normalizeEntries(data);
          sortEntries();
          render();
        } catch (err) {
          console.error('Leaderboard fetch failed:', err);
          entries = [];
          setError(true);
        } finally {
          clearTimeout(timeoutId);
          setLoading(false);
        }
      }

      retryButton.addEventListener('click', fetchLeaderboard);
      sortDescButton.addEventListener('click', function () { handleSort('desc'); });
      sortAscButton.addEventListener('click', function () { handleSort('asc'); });

      fetchLeaderboard();
    })();
  </script>
</body>
</html>
